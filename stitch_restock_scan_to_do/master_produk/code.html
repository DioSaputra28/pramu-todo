<script>
        // Simple script to handle input focus state styling if needed beyond CSS focus-within
        const searchInput = document.querySelector('input[type="text"]');
        const searchContainer = searchInput.parentElement;

        searchInput.addEventListener('focus', () => {
            searchContainer.classList.add('bg-secondary-container');
        });

        searchInput.addEventListener('blur', () => {
            searchContainer.classList.remove('bg-secondary-container');
        });
    </script>
