<body class="bg-surface text-on-surface min-h-screen pb-24 md:pb-0">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant fixed top-0 left-0 w-full z-50 h-14 flex justify-between items-center px-margin-mobile">
<button class="text-primary hover:bg-secondary-container active:scale-95 transition-all p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary truncate px-4">Tambah Produk</h1>
<button class="text-primary hover:bg-secondary-container active:scale-95 transition-all p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content -->
<main class="pt-20 px-margin-mobile flex flex-col gap-lg max-w-md mx-auto">
<!-- Barcode Read-only Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-secondary">Barcode</label>
<div class="h-12 bg-surface-container-low border border-outline-variant rounded-DEFAULT flex items-center px-md text-secondary font-body-md text-body-md select-none">
<span class="material-symbols-outlined mr-2 text-outline" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 0; stroke-width: 2px;">qr_code_scanner</span>
                899123456789
            </div>
</div>
<!-- Nama Barang Form Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="nama_barang">Nama Barang</label>
<input class="h-12 bg-surface border border-outline-variant rounded-DEFAULT px-md text-on-surface font-body-md text-body-md focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary placeholder:text-outline focus:bg-[#EAF1FF] transition-colors" id="nama_barang" name="nama_barang" placeholder="Masukkan nama barang" type="text"/>
</div>
<!-- Actions -->
<div class="flex flex-col gap-md mt-lg">
<button class="w-full h-12 bg-[#1E5BFF] text-white font-headline-md text-headline-md rounded-DEFAULT flex items-center justify-center active:scale-[0.98] transition-transform">
                Simpan
            </button>
<button class="w-full h-12 text-[#1E5BFF] font-label-bold text-label-bold rounded-DEFAULT flex items-center justify-center hover:bg-surface-container-low active:bg-secondary-container transition-colors">
                Batal
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface border-t border-outline-variant fixed bottom-0 left-0 w-full z-50 h-16 flex justify-around items-center pb-safe md:hidden">
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:opacity-80 transition-all flex-1 h-full">
<span class="material-symbols-outlined mb-1" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 0; stroke-width: 2px;">qr_code_scanner</span>
<span class="font-label-sm text-label-sm">Scan</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary hover:bg-surface-container-low active:opacity-80 transition-all flex-1 h-full">
<span class="material-symbols-outlined mb-1" data-icon="checklist" style="font-variation-settings: 'FILL' 0; stroke-width: 2px;">checklist</span>
<span class="font-label-sm text-label-sm">To-Do</span>
</button>
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low active:opacity-80 transition-all flex-1 h-full">
<span class="material-symbols-outlined mb-1" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1; stroke-width: 2px;">inventory_2</span>
<span class="font-label-bold text-label-bold">Master</span>
</button>
</nav>
